<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhanu Sri Appana — Visiting Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1fa2ff, #f3ec78, #af4261);
      background-size: 200% 200%;
      animation: gradientBG 10s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .card {
      width: 370px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
      padding: 35px 25px;
      text-align: center;
      backdrop-filter: blur(10px);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .picture {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: block;
      object-fit: cover;
      border: 3px solid #2563eb;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
    }

    .name {
      font-size: 20px;
      font-weight: 700;
      color: #0f172a;
    }

    .title {
      font-size: 14px;
      color: #2563eb;
      margin-bottom: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    .socials a {
      color: #0f172a;
      font-size: 18px;
      text-decoration: none;
      transition: transform 0.3s, color 0.3s;
    }

    .socials a:hover {
      color: #2563eb;
      transform: scale(1.15);
    }

    .hackerrank-icon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      vertical-align: middle;
    }

    .info {
      font-size: 13px;
      color: #374151;
      text-align: left;
      margin-top: 15px;
      line-height: 1.6;
    }

    .info p {
      margin: 6px 0;
    }

    .info strong {
      color: #0f172a;
    }

    .info a {
      color: #2563eb;
      text-decoration: none;
    }

    .info a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="C:/Users/bhanu/OneDrive/Pictures/23P31A1269.jpg" alt="Bhanu Sri Appana" class="picture">
    <div class="name">Bhanu Sri Appana</div>
    <div class="title">Frontend Developer</div>

    <div class="socials">
      <a href="https://www.linkedin.com/in/bhanu-sri-appana-b61b76290/" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a href="https://github.com/BhanuSri7997" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
      <a href="https://www.hackerrank.com/profile/bhanusriappana10" target="_blank" title="HackerRank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/HackerRank_Icon-1000px.png" alt="HackerRank" class="hackerrank-icon">
      </a>
    </div>

    <div class="info">
      <p><strong>Email:</strong> <a href="mailto:23p31a1269@acet.ac.in">23p31a1269@acet.ac.in</a></p>
      <p><strong>Phone:</strong> +91 XXXXXXXXXX</p>
      <p><strong>College:</strong> Aditya College of Engineering & Technology</p>
    </div>
  </div>
</body>
</html>
